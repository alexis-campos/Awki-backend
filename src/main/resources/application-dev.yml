spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/awki_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:awki-dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-padding}
  expiration: ${JWT_EXPIRATION:86400000}

server:
  port: ${PORT:8080}

logging:
  file:
    name: spring.log
  level:
    com.awki: DEBUG
    org.springframework.security: DEBUG

gemini:
  api-key: ${GEMINI_API_KEY:mock-key}
  api-url: https://generativelanguage.googleapis.com
  model: ${GEMINI_MODEL:gemini-2.0-flash}
  timeout-seconds: 8
  mock-enabled: ${GEMINI_MOCK_ENABLED:true}

notifications:
  mock-enabled: ${NOTIFICATIONS_MOCK_ENABLED:true}

epicrisis:
  storage:
    mode: ${EPICRISIS_STORAGE_MODE:local}
    local-path: ${EPICRISIS_STORAGE_PATH:uploads/epicrisis}
