spring:
  application:
    name: awki-backend
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

cors:
  allowed-origins: http://localhost:5173

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

gemini:
  api-key: ${GEMINI_API_KEY:mock-key}
  api-url: https://generativelanguage.googleapis.com
  model: gemini-2.5-flash-lite
  timeout-seconds: 8
  mock-enabled: true

notifications:
  mock-enabled: ${NOTIFICATIONS_MOCK_ENABLED:true}
  twilio:
    enabled: ${TWILIO_ENABLED:false}
    account-sid: ${TWILIO_ACCOUNT_SID:mock-sid}
    auth-token: ${TWILIO_AUTH_TOKEN:mock-token}
    from-number: ${TWILIO_FROM_NUMBER:+000000000}
    timeout-seconds: ${TWILIO_TIMEOUT_SECONDS:10}
  whatsapp:
    enabled: ${WHATSAPP_ENABLED:false}
    token: ${WHATSAPP_BUSINESS_TOKEN:mock-token}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:mock-phone-id}
    timeout-seconds: ${WHATSAPP_TIMEOUT_SECONDS:10}
  firebase:
    enabled: ${FCM_ENABLED:false}
    credentials-path: ${FCM_CREDENTIALS_PATH:}
    timeout-seconds: ${FCM_TIMEOUT_SECONDS:10}

